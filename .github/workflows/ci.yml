name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  engine-self-test:
    name: Engine self-test (deterministic HAR fixture)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run analysis engine on demo fixture
        run: node run.js demo-dapp.har

      - name: Regression gate — verify engine detections
        run: node scripts/verify-engine.js

      - name: Upload evidence artifacts (HTML report + JSON dataset)
        uses: actions/upload-artifact@v4
        with:
          name: qasl-web3-sentinel-reports
          path: |
            reports/web3-report-demo-dapp.html
            reports/web3-data-demo-dapp.json
          retention-days: 30
